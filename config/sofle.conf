# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Power management - sleep after 15 min idle
CONFIG_ZMK_SLEEP=y

# RGB underglow - DISABLED to save battery on wireless build
# Uncomment these lines if you want RGB (will significantly reduce battery life)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
# CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
# CONFIG_WS2812_STRIP=y

# Bluetooth - boost TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
